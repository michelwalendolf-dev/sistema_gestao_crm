<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Wolftech</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            height:100vh;
            background: radial-gradient(circle at top, #0b1b2b, #081421);
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            width:1100px;
            height:600px;
            display:flex;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 0 40px rgba(0,0,0,0.6);
        }

        .left{
            width:50%;
            height:100%;
            background: url('layout_login.png') no-repeat center center;
            background-size: cover;
        }

        .left img{
            width:180px;
            margin-bottom:20px;
        }

        .left h1{
            font-size:38px;
            letter-spacing:4px;
        }

        .left h2{
            font-weight:300;
            letter-spacing:6px;
            margin-top:10px;
        }

        .left footer{
            position:absolute;
            bottom:25px;
            font-size:12px;
            opacity:0.7;
        }

        .right{
            width:50%;
            background: linear-gradient(180deg, #0b1f33, #081421);
            padding:30px;
            color:#fff;
        }

        .right h2{
            text-align:center;
            margin-bottom:30px;
            font-weight:500;
        }

        .divider{
            width:100%;
            padding:0 1px;
            height:1px;
            background:#0b1f33;
            margin:0 auto 10px auto;
            border-color: #3e5872;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border-radius:6px;
            border:1px solid #1e3a56;
            background:#0e2438;
            color:#fff;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#2d7dff;
            box-shadow:0 0 8px #2d7dff80;
        }

        .captcha{
            margin:15px 0;
            padding:15px;
            border-radius:8px;
            border:1px solid #1e3a56;
            background:#0e2438;
            display:flex;
            align-items:center;
            gap:10px;
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:6px;
            background:#1f6bff;
            color:#fff;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            margin-top:10px;
        }

        .btn:hover{
            background:#2d7dff;
            box-shadow:0 0 12px #2d7dff80;
        }

        .forgot{
            text-align:center;
            margin-top:15px;
            font-size:13px;
            opacity:0.7;
            cursor:pointer;
        }

        .cookies{
            margin-top:35px;
            background:#0e2438;
            padding:12px;
            border-radius:8px;
            font-size:12px;
            opacity:0.7;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="left"></div>

    <div class="right">
        <h2>Acesso ao Sistema de CRM</h2>

        <hr class="divider">

        <div class="input-group">
            <input type="text" placeholder="Usuário">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Senha">
        </div>

        <div class="captcha">
            <input type="checkbox">
            <span>Não sou um robô</span>
        </div>

        <button class="btn">Entrar</button>

        <div class="forgot">Esqueci minha senha</div>

        <div class="cookies">
            Usamos cookies apenas para segurança, sem compartilhamento de informações privadas.
            Ao continuar, você concorda com seu uso.
        </div>
    </div>

</div>

</body>
</html>
